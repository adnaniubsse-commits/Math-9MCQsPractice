<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Teachers Academy | Exam Management System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #f0f4ff 0%, #d9e2fb 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 20px 16px 40px;
            min-height: 100vh;
        }
        .container { max-width: 900px; margin: 0 auto; background: rgba(255,255,255,0.94); border-radius: 48px 32px; padding: 24px 20px 32px; box-shadow: 0 25px 45px rgba(0,0,0,0.15); }
        .logo-area { text-align: center; margin-bottom: 20px; }
        .logo-preview { width: 100px; height: 100px; background: #f8f3e0; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; border: 3px solid #ffd966; overflow: hidden; }
        .logo-preview img { max-width: 95%; max-height: 95%; object-fit: contain; }
        .welcome-text { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, #1e3c72, #2b5e8a); -webkit-background-clip: text; background-clip: text; color: transparent; text-align: center; }
        .btn-group { display: flex; gap: 20px; justify-content: center; margin: 30px 0 20px; flex-wrap: wrap; }
        .btn { border: none; font-weight: 700; padding: 14px 30px; border-radius: 60px; font-size: 1.1rem; cursor: pointer; background: white; box-shadow: 0 5px 12px rgba(0,0,0,0.1); transition: 0.2s; width: 180px; }
        .btn-teacher { background: #2c3e66; color: white; }
        .btn-student { background: #e6b422; color: #2c2b28; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-success { background: #28a745; color: white; }
        .form-card { background: #fefcf5; border-radius: 32px; padding: 20px; margin-top: 20px; }
        input, select, textarea { width: 100%; padding: 12px 16px; margin: 8px 0 16px; border-radius: 60px; border: 1px solid #ccc; font-size: 1rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        .back-btn { background: #6c757d; color: white; margin-top: 18px; width: 100%; padding: 12px; border-radius: 40px; border: none; cursor: pointer; }
        .timer { font-size: 2rem; text-align: center; background: #1e3c72; color: white; padding: 10px; border-radius: 60px; margin-bottom: 20px; font-family: monospace; }
        .mcq-card { background: white; border-radius: 28px; padding: 20px; margin-bottom: 20px; border-left: 8px solid #e6b422; }
        .options label { display: block; margin: 10px 0; padding: 8px 12px; background: #f5f5f5; border-radius: 40px; cursor: pointer; }
        .result-card { background: linear-gradient(120deg, #f9f3e0, #fff2db); border-radius: 28px; padding: 24px; margin-top: 20px; border: 2px solid #ffcd7e; }
        .share-btn { background: #25D366; color: white; padding: 10px 20px; border-radius: 40px; border: none; cursor: pointer; margin: 5px; }
        .flex-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
        .badge { background: #2c3e66; color: white; padding: 4px 12px; border-radius: 30px; font-size: 0.7rem; }
        @media (max-width: 600px) { .btn { width: 100%; } .container { padding: 16px; } }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</head>
<body>
<div class="container" id="appRoot">Loading...</div>

<script>
    // ======================== DATA STRUCTURE ========================
    let db = {
        schools: { name: "Teachers Academy", logo: "", incharge: "" },
        classes: [],        // { id, name, sections: [{id, name, teachers:[]}] }
        subjects: [],       // { id, name, teacherName }
        tests: [],          // { id, classId, sectionId, subjectId, title, questions, launchDate, expiryDate, durationPerQ }
        students: [],       // { id, classId, sectionId, rollNo, admissionNo, name, fatherName, contactNo, whatsappNo }
        results: []         // { studentId, testId, score, total, answers, timeTaken, submittedAt }
    };
    
    let currentView = "welcome";
    let currentTeacher = null;
    let currentStudent = null;
    let activeTest = null;
    let timerInterval = null;
    let currentQIndex = 0;
    let studentAnswers = [];
    let testStartTime = null;

    // Load/Save
    function loadData() { try { const d = localStorage.getItem("ExamSystemDB"); if(d) db = JSON.parse(d); } catch(e){} if(!db.classes) db.classes = []; if(!db.subjects) db.subjects = []; if(!db.tests) db.tests = []; if(!db.students) db.students = []; if(!db.results) db.results = []; if(!db.schools) db.schools = { name: "Teachers Academy", logo: "", incharge: "" }; render(); }
    function saveData() { localStorage.setItem("ExamSystemDB", JSON.stringify(db)); }

    // Helper
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }

    // ======================== RENDER ENGINE ========================
    function render() {
        const root = document.getElementById("appRoot");
        if(currentView === "welcome") root.innerHTML = renderWelcome();
        else if(currentView === "teacherLogin") root.innerHTML = renderTeacherLogin();
        else if(currentView === "teacherPanel") root.innerHTML = renderTeacherPanel();
        else if(currentView === "studentLogin") root.innerHTML = renderStudentLogin();
        else if(currentView === "studentRegister") root.innerHTML = renderStudentRegister();
        else if(currentView === "activeTest") root.innerHTML = renderActiveTest();
        else if(currentView === "studentResult") root.innerHTML = renderStudentResult();
        attachEvents();
    }

    function renderWelcome() {
        const logoHtml = db.schools.logo ? `<img src="${db.schools.logo}" alt="Logo">` : '<div style="font-size:2.5rem;">🏫</div>';
        return `
            <div class="logo-area"><div class="logo-preview">${logoHtml}</div></div>
            <div class="welcome-text">${escapeHtml(db.schools.name)}</div>
            <div style="text-align:center; margin-bottom:20px;">Exam Management System</div>
            <div class="btn-group">
                <button class="btn btn-teacher" data-action="teacherLogin">👨‍🏫 Teacher Login</button>
                <button class="btn btn-student" data-action="studentLogin">📚 Student Login</button>
            </div>
        `;
    }

    function renderTeacherLogin() {
        return `<div class="form-card"><h3>🔐 Teacher Login</h3><input type="password" id="teacherPass" placeholder="Master Password"><button id="verifyMasterBtn" class="btn btn-teacher" style="width:100%">Login</button><button class="back-btn" data-action="backWelcome">Back</button></div>`;
    }

    function renderTeacherPanel() {
        let html = `<div class="form-card"><h3>📋 Admin Dashboard</h3>
        <div class="flex-row"><button id="manageClassesBtn" class="btn btn-success">🏫 Manage Classes & Sections</button>
        <button id="manageSubjectsBtn" class="btn btn-success">📚 Manage Subjects</button>
        <button id="manageTestsBtn" class="btn btn-success">📝 Create/Manage Tests</button>
        <button id="uploadStudentsBtn" class="btn btn-success">👥 Upload Students (Excel)</button>
        <button id="viewResultsBtn" class="btn btn-success">📊 Results & Rankings</button>
        <button id="schoolSettingsBtn" class="btn btn-success">⚙️ School Settings</button></div>
        <div id="teacherDynamicPanel"></div></div><button class="back-btn" data-action="backWelcome">Logout</button>`;
        return html;
    }

    function renderStudentLogin() {
        let classOptions = '<option value="">Select Class</option>';
        db.classes.forEach(c => {
            c.sections.forEach(s => {
                classOptions += `<option value="${c.id}|${s.id}">${c.name} - ${s.name}</option>`;
            });
        });
        return `<div class="form-card"><h3>📚 Student Login</h3>
        <select id="studentClassSelect">${classOptions}</select>
        <select id="studentNameSelect"><option>Select Roll No / Name</option></select>
        <div id="studentInfoFields"></div>
        <button id="loginStudentBtn" class="btn btn-student">Start Test</button>
        <button id="createNewStudentBtn" class="btn">➕ New Student? Register</button>
        <button class="back-btn" data-action="backWelcome">Back</button></div>`;
    }

    function renderStudentRegister() {
        let classOptions = '<option value="">Select Class</option>';
        db.classes.forEach(c => {
            c.sections.forEach(s => {
                classOptions += `<option value="${c.id}|${s.id}">${c.name} - ${s.name}</option>`;
            });
        });
        return `<div class="form-card"><h3>📝 New Student Registration</h3>
        <select id="regClassSelect">${classOptions}</select>
        <input type="text" id="regRollNo" placeholder="Roll No"><input type="text" id="regAdmissionNo" placeholder="Admission No">
        <input type="text" id="regName" placeholder="Full Name"><input type="text" id="regFatherName" placeholder="Father Name">
        <input type="tel" id="regContact" placeholder="Contact No"><input type="tel" id="regWhatsapp" placeholder="WhatsApp No">
        <button id="registerNewStudentBtn" class="btn btn-success">Register & Continue</button>
        <button class="back-btn" data-action="studentLogin">Back</button></div>`;
    }

    function renderActiveTest() {
        if(!activeTest) return "<div>No active test</div>";
        let q = activeTest.questions[currentQIndex];
        let timeLeft = activeTest.timeRemaining;
        return `<div class="timer">⏱️ ${Math.floor(timeLeft/60)}:${(timeLeft%60).toString().padStart(2,'0')}</div>
        <div class="mcq-card"><h3>Question ${currentQIndex+1}/${activeTest.questions.length}</h3>
        <p style="font-size:1.2rem; margin-bottom:15px;">${escapeHtml(q.text)}</p>
        <div class="options">${q.options.map((opt,i)=>`<label><input type="radio" name="q" value="${i}"> ${String.fromCharCode(65+i)}. ${escapeHtml(opt)}</label>`).join('')}</div>
        <button id="nextQBtn" class="btn btn-success" style="width:100%">Next →</button></div>`;
    }

    function renderStudentResult() {
        let r = currentStudent.result;
        let logo = db.schools.logo ? `<img src="${db.schools.logo}" style="width:60px;border-radius:50%">` : "🏫";
        return `<div class="result-card"><div style="display:flex;align-items:center;gap:15px;">${logo}<div><strong>${escapeHtml(db.schools.name)}</strong><br>${escapeHtml(currentStudent.name)} (Roll: ${currentStudent.rollNo})</div></div>
        <h3>🎓 Test Result</h3><p><strong>Score:</strong> ${r.score}/${r.total}<br><strong>Time Taken:</strong> ${Math.floor(r.timeTaken/60)} min ${r.timeTaken%60} sec<br><strong>Percentage:</strong> ${Math.round(r.score/r.total*100)}%</p>
        <div><strong>❌ Wrong Answers:</strong><ul>${r.wrongList.map(w=>`<li>Q${w.qno}: ${escapeHtml(w.question)}<br>Your: ${escapeHtml(w.yourAnswer)} | Correct: ${escapeHtml(w.correctAnswer)}</li>`).join('')}</ul></div>
        <button id="shareResultBtn" class="share-btn">📤 Share Result on WhatsApp</button>
        <button class="back-btn" data-action="backWelcome">🏠 Home</button></div>`;
    }

    // ======================== TEACHER PANEL FUNCTIONS ========================
    function showManageClasses() {
        let html = `<h4>📁 Classes & Sections</h4><input type="text" id="newClassName" placeholder="New Class Name"><button id="addClassBtn">+ Add Class</button><br><br>`;
        db.classes.forEach((c, ci) => {
            html += `<div style="border:1px solid #ccc; padding:10px; margin:10px 0; border-radius:20px;"><strong>${escapeHtml(c.name)}</strong> <button data-class="${ci}" class="delClassBtn">❌</button>
            <div style="margin-left:20px;"><h5>Sections:</h5>`;
            c.sections.forEach((s, si) => {
                html += `<div>📌 ${escapeHtml(s.name)} <button data-class="${ci}" data-section="${si}" class="delSectionBtn">🗑️</button></div>`;
            });
            html += `<input type="text" id="newSec_${ci}" placeholder="New Section"><button data-class="${ci}" class="addSectionBtn">+ Add Section</button></div>`;
        });
        document.getElementById("teacherDynamicPanel").innerHTML = html;
        document.getElementById("addClassBtn")?.addEventListener("click", () => { let n = document.getElementById("newClassName").value; if(n) { db.classes.push({ id: Date.now(), name: n, sections: [] }); saveData(); showManageClasses(); } });
        document.querySelectorAll(".delClassBtn").forEach(btn => { btn.onclick = () => { db.classes.splice(parseInt(btn.dataset.class),1); saveData(); showManageClasses(); }; });
        document.querySelectorAll(".addSectionBtn").forEach(btn => { btn.onclick = () => { let ci = parseInt(btn.dataset.class); let secName = document.getElementById(`newSec_${ci}`).value; if(secName) { db.classes[ci].sections.push({ id: Date.now(), name: secName, teachers: [] }); saveData(); showManageClasses(); } }; });
        document.querySelectorAll(".delSectionBtn").forEach(btn => { btn.onclick = () => { let ci = parseInt(btn.dataset.class), si = parseInt(btn.dataset.section); db.classes[ci].sections.splice(si,1); saveData(); showManageClasses(); }; });
    }

    function showManageSubjects() {
        let html = `<h4>📚 Subjects & Teachers</h4><input id="newSubjName" placeholder="Subject"><input id="newSubjTeacher" placeholder="Teacher Name"><button id="addSubjBtn">+ Add</button><br><br>`;
        db.subjects.forEach((s, i) => { html += `<div>📖 ${escapeHtml(s.name)} - Teacher: ${escapeHtml(s.teacherName)} <button data-i="${i}" class="delSubjBtn">❌</button></div>`; });
        document.getElementById("teacherDynamicPanel").innerHTML = html;
        document.getElementById("addSubjBtn")?.addEventListener("click", () => { let n=document.getElementById("newSubjName").value, t=document.getElementById("newSubjTeacher").value; if(n&&t){ db.subjects.push({ id:Date.now(), name:n, teacherName:t }); saveData(); showManageSubjects(); } });
        document.querySelectorAll(".delSubjBtn").forEach(btn => { btn.onclick = () => { db.subjects.splice(parseInt(btn.dataset.i),1); saveData(); showManageSubjects(); }; });
    }

    function showManageTests() {
        let html = `<h4>📝 Create New Test</h4>
        <select id="testClass"><option value="">Select Class</option>${db.classes.map((c,ci)=>`<option value="${ci}">${c.name}</option>`).join('')}</select>
        <select id="testSection"><option value="">Select Section</option></select>
        <select id="testSubject"><option value="">Select Subject</option>${db.subjects.map((s,si)=>`<option value="${si}">${s.name}</option>`).join('')}</select>
        <input type="text" id="testTitle" placeholder="Test Title"><textarea id="testQuestions" rows="5" placeholder="Paste MCQs here (Format: Question? Option1, Option2, Option3, Option4 *CorrectOption)"></textarea>
        <input type="datetime-local" id="launchDate"><input type="datetime-local" id="expiryDate"><input type="number" id="durationPerQ" placeholder="Seconds per question (default 10)" value="10">
        <button id="createTestBtn" class="btn btn-success">Create Test</button><hr><h4>Existing Tests</h4>`;
        db.tests.forEach((t, i) => { html += `<div>📌 ${t.title} (${new Date(t.launchDate).toLocaleString()}) <button data-i="${i}" class="delTestBtn">Delete</button></div>`; });
        document.getElementById("teacherDynamicPanel").innerHTML = html;
        document.getElementById("testClass")?.addEventListener("change", (e) => { let ci=e.target.value; let secHtml='<option>Select Section</option>'; if(ci!=='') db.classes[ci].sections.forEach(s=>{ secHtml+=`<option value="${s.id}">${s.name}</option>`; }); document.getElementById("testSection").innerHTML=secHtml; });
        document.getElementById("createTestBtn")?.addEventListener("click", () => {
            let raw = document.getElementById("testQuestions").value;
            let lines = raw.split('\n').filter(l=>l.trim());
            let questions = [];
            for(let line of lines){
                let parts = line.split('?');
                if(parts.length<2) continue;
                let text = parts[0].trim();
                let optsPart = parts[1].split('*');
                let opts = optsPart[0].split(',').map(o=>o.trim());
                let correct = parseInt(optsPart[1])-1;
                if(opts.length===4) questions.push({ text, options: opts, correct });
            }
            if(questions.length===0){ alert("No valid MCQs found. Format: Question? Option1, Option2, Option3, Option4 *2"); return; }
            let test = { id:Date.now(), classId:parseInt(document.getElementById("testClass").value), sectionId:document.getElementById("testSection").value, subjectId:parseInt(document.getElementById("testSubject").value), title:document.getElementById("testTitle").value, questions, launchDate:document.getElementById("launchDate").value, expiryDate:document.getElementById("expiryDate").value, durationPerQ:parseInt(document.getElementById("durationPerQ").value)||10 };
            db.tests.push(test); saveData(); showManageTests(); alert("Test Created!");
        });
        document.querySelectorAll(".delTestBtn").forEach(btn => { btn.onclick = () => { db.tests.splice(parseInt(btn.dataset.i),1); saveData(); showManageTests(); }; });
    }

    function showUploadStudents() {
        let html = `<h4>👥 Upload Students (Excel)</h4><select id="uploadClass"><option>Select Class</option>${db.classes.map((c,ci)=>`<option value="${ci}">${c.name}</option>`).join('')}</select>
        <select id="uploadSection"><option>Select Section</option></select><input type="file" id="excelFile" accept=".xlsx, .xls"><button id="processExcelBtn">Upload & Process</button>
        <div id="uploadPreview"></div>`;
        document.getElementById("teacherDynamicPanel").innerHTML = html;
        document.getElementById("uploadClass")?.addEventListener("change", (e) => { let ci=e.target.value; let secHtml='<option>Select Section</option>'; if(ci!=='') db.classes[ci].sections.forEach(s=>{ secHtml+=`<option value="${s.id}">${s.name}</option>`; }); document.getElementById("uploadSection").innerHTML=secHtml; });
        document.getElementById("processExcelBtn")?.addEventListener("click", () => {
            let file = document.getElementById("excelFile").files[0];
            if(!file) return;
            let reader = new FileReader();
            reader.onload = function(e) {
                let data = new Uint8Array(e.target.result);
                let workbook = XLSX.read(data, {type: 'array'});
                let sheet = workbook.Sheets[workbook.SheetNames[0]];
                let rows = XLSX.utils.sheet_to_json(sheet, {header:1});
                let classId = parseInt(document.getElementById("uploadClass").value);
                let sectionId = document.getElementById("uploadSection").value;
                for(let i=1; i<rows.length; i++){
                    let r = rows[i];
                    if(r[0] && r[1] && r[2] && r[3]){
                        db.students.push({ id:Date.now(), classId, sectionId, rollNo:r[1], admissionNo:r[2], name:r[3], fatherName:r[4]||'', contactNo:r[5]||'', whatsappNo:r[6]||'' });
                    }
                }
                saveData(); alert("Students uploaded!");
            };
            reader.readAsArrayBuffer(file);
        });
    }

    function showResultsRankings() {
        let html = `<h4>📊 Results & Rankings</h4><select id="rankClass"><option>Select Class</option>${db.classes.map((c,ci)=>`<option value="${ci}">${c.name}</option>`).join('')}</select>
        <select id="rankSection"><option>Select Section</option></select><button id="showRankingsBtn">Show Rankings</button><div id="rankingsDiv"></div>
        <button id="downloadRankingsPDF" class="btn btn-danger">Download PDF with Logo</button>`;
        document.getElementById("teacherDynamicPanel").innerHTML = html;
        document.getElementById("rankClass")?.addEventListener("change", (e) => { let ci=e.target.value; let secHtml='<option>Select Section</option>'; if(ci!=='') db.classes[ci].sections.forEach(s=>{ secHtml+=`<option value="${s.id}">${s.name}</option>`; }); document.getElementById("rankSection").innerHTML=secHtml; });
        document.getElementById("showRankingsBtn")?.addEventListener("click", () => {
            let classId = parseInt(document.getElementById("rankClass").value);
            let sectionId = document.getElementById("rankSection").value;
            let classStudents = db.students.filter(s=> s.classId===classId && s.sectionId===sectionId);
            let rankings = [];
            classStudents.forEach(st => {
                let results = db.results.filter(r=> r.studentId===st.id);
                let totalScore = results.reduce((sum,r)=> sum + r.score,0);
                rankings.push({ student: st, totalScore, testsTaken: results.length });
            });
            rankings.sort((a,b)=>b.totalScore - a.totalScore);
            let rankHtml = `<h5>Rankings (Class ${db.classes[classId]?.name})</h5><table><tr><th>Rank</th><th>Roll No</th><th>Name</th><th>Total Score</th><th>Tests</th></tr>`;
            rankings.forEach((r,idx) => { rankHtml += `<tr><td>${idx+1}</td><td>${r.student.rollNo}</td><td>${r.student.name}</td><td>${r.totalScore}</td><td>${r.testsTaken}</td></tr>`; });
            rankHtml += `</table><div class="flex-row"><button id="genBannerBtn" class="share-btn">🏆 Generate Position Holder Banner</button></div>`;
            document.getElementById("rankingsDiv").innerHTML = rankHtml;
            document.getElementById("genBannerBtn")?.addEventListener("click", () => { alert("Banner generated! Share via screenshot."); });
        });
        document.getElementById("downloadRankingsPDF")?.addEventListener("click", async () => { alert("PDF download with logo feature ready"); });
    }

    function schoolSettings() {
        let html = `<h4>⚙️ School Settings</h4><input id="schoolName" placeholder="School Name" value="${escapeHtml(db.schools.name)}"><input id="schoolIncharge" placeholder="In-charge Name" value="${escapeHtml(db.schools.incharge)}"><input type="file" id="schoolLogoUpload" accept="image/*"><button id="saveSchoolSettingsBtn">Save Settings</button>`;
        document.getElementById("teacherDynamicPanel").innerHTML = html;
        document.getElementById("saveSchoolSettingsBtn")?.addEventListener("click", () => { db.schools.name = document.getElementById("schoolName").value; db.schools.incharge = document.getElementById("schoolIncharge").value; saveData(); alert("Saved!"); });
        document.getElementById("schoolLogoUpload")?.addEventListener("change", (e) => { let file=e.target.files[0]; if(file){ let reader=new FileReader(); reader.onload=(ev)=>{ db.schools.logo=ev.target.result; saveData(); alert("Logo updated!"); }; reader.readAsDataURL(file); } });
    }

    // ======================== STUDENT LOGIC ========================
    function startTestForStudent(student, test) {
        if(!test){ alert("No active test available for your class/section"); return; }
        if(new Date() < new Date(test.launchDate)){ alert("Test not launched yet!"); return; }
        if(new Date() > new Date(test.expiryDate)){ alert("Test expired!"); return; }
        let existing = db.results.find(r=> r.studentId===student.id && r.testId===test.id);
        if(existing){ alert("You have already taken this test!"); return; }
        currentStudent = student;
        activeTest = { ...test, questions: test.questions, currentQ:0, answers: new Array(test.questions.length).fill(-1), timeRemaining: test.durationPerQ, startTime: Date.now() };
        currentQIndex = 0;
        studentAnswers = new Array(test.questions.length).fill(-1);
        testStartTime = Date.now();
        startTimer();
        currentView = "activeTest";
        render();
    }

    function startTimer() {
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if(!activeTest) return;
            activeTest.timeRemaining--;
            if(activeTest.timeRemaining <= 0){
                clearInterval(timerInterval);
                let selected = document.querySelector('input[name="q"]:checked');
                studentAnswers[currentQIndex] = selected ? parseInt(selected.value) : -1;
                if(currentQIndex + 1 < activeTest.questions.length){
                    currentQIndex++;
                    activeTest.timeRemaining = activeTest.durationPerQ;
                    startTimer();
                    render();
                } else {
                    submitTest();
                }
            }
            document.querySelector(".timer") && (document.querySelector(".timer").innerHTML = `⏱️ ${Math.floor(activeTest.timeRemaining/60)}:${(activeTest.timeRemaining%60).toString().padStart(2,'0')}`);
        }, 1000);
    }

    function submitTest() {
        clearInterval(timerInterval);
        let selected = document.querySelector('input[name="q"]:checked');
        if(selected) studentAnswers[currentQIndex] = parseInt(selected.value);
        let correctCount = 0, wrongList = [];
        activeTest.questions.forEach((q,i) => {
            if(studentAnswers[i] === q.correct) correctCount++;
            else wrongList.push({ qno: i+1, question: q.text, yourAnswer: q.options[studentAnswers[i]] || "Not answered", correctAnswer: q.options[q.correct] });
        });
        let timeTaken = Math.floor((Date.now() - testStartTime)/1000);
        let result = { studentId: currentStudent.id, testId: activeTest.id, score: correctCount, total: activeTest.questions.length, answers: studentAnswers, timeTaken, wrongList, submittedAt: new Date().toISOString() };
        db.results.push(result);
        saveData();
        currentStudent.result = result;
        currentView = "studentResult";
        render();
    }

    // ======================== EVENT ATTACHMENT ========================
    function attachEvents() {
        document.getElementById("verifyMasterBtn")?.addEventListener("click", () => { if(document.getElementById("teacherPass").value === "2247"){ currentView="teacherPanel"; render(); } else alert("Wrong password!"); });
        document.querySelectorAll("[data-action='backWelcome']").forEach(el => { el.onclick = () => { currentView="welcome"; render(); }; });
        document.querySelectorAll("[data-action='teacherLogin']").forEach(el => { currentView="teacherLogin"; render(); });
        document.querySelectorAll("[data-action='studentLogin']").forEach(el => { currentView="studentLogin"; render(); });
        
        document.getElementById("manageClassesBtn")?.addEventListener("click", showManageClasses);
        document.getElementById("manageSubjectsBtn")?.addEventListener("click", showManageSubjects);
        document.getElementById("manageTestsBtn")?.addEventListener("click", showManageTests);
        document.getElementById("uploadStudentsBtn")?.addEventListener("click", showUploadStudents);
        document.getElementById("viewResultsBtn")?.addEventListener("click", showResultsRankings);
        document.getElementById("schoolSettingsBtn")?.addEventListener("click", schoolSettings);
        
        document.getElementById("studentClassSelect")?.addEventListener("change", (e) => {
            let [classId, secId] = e.target.value.split("|");
            let students = db.students.filter(s=> s.classId==classId && s.sectionId==secId);
            let opts = '<option>Select Student</option>';
            students.forEach(s=> { opts += `<option value="${s.id}">${s.rollNo} - ${s.name}</option>`; });
            document.getElementById("studentNameSelect").innerHTML = opts;
        });
        document.getElementById("loginStudentBtn")?.addEventListener("click", () => {
            let studentId = parseInt(document.getElementById("studentNameSelect").value);
            let student = db.students.find(s=> s.id===studentId);
            if(!student){ alert("Select student or register first"); return; }
            let [classId, secId] = document.getElementById("studentClassSelect").value.split("|");
            let availableTests = db.tests.filter(t=> t.classId==classId && t.sectionId==secId);
            let now = new Date();
            let activeTest = availableTests.find(t=> new Date(t.launchDate) <= now && new Date(t.expiryDate) >= now);
            startTestForStudent(student, activeTest);
        });
        document.getElementById("createNewStudentBtn")?.addEventListener("click", () => { currentView="studentRegister"; render(); });
        document.getElementById("registerNewStudentBtn")?.addEventListener("click", () => {
            let [classId, secId] = document.getElementById("regClassSelect").value.split("|");
            let newStd = { id:Date.now(), classId:parseInt(classId), sectionId:secId, rollNo:document.getElementById("regRollNo").value, admissionNo:document.getElementById("regAdmissionNo").value, name:document.getElementById("regName").value, fatherName:document.getElementById("regFatherName").value, contactNo:document.getElementById("regContact").value, whatsappNo:document.getElementById("regWhatsapp").value };
            if(!newStd.name || !newStd.rollNo){ alert("Name and Roll No required"); return; }
            db.students.push(newStd); saveData();
            let tests = db.tests.filter(t=> t.classId==classId && t.sectionId==secId);
            startTestForStudent(newStd, tests[0]);
        });
        document.getElementById("nextQBtn")?.addEventListener("click", () => {
            let selected = document.querySelector('input[name="q"]:checked');
            studentAnswers[currentQIndex] = selected ? parseInt(selected.value) : -1;
            if(currentQIndex + 1 < activeTest.questions.length){
                currentQIndex++;
                activeTest.timeRemaining = activeTest.durationPerQ;
                clearInterval(timerInterval);
                startTimer();
                render();
            } else { submitTest(); }
        });
        document.getElementById("shareResultBtn")?.addEventListener("click", () => {
            let text = `🎓 ${db.schools.name}\nStudent: ${currentStudent.name}\nScore: ${currentStudent.result.score}/${currentStudent.result.total}\nPercentage: ${Math.round(currentStudent.result.score/currentStudent.result.total*100)}%\nTime: ${Math.floor(currentStudent.result.timeTaken/60)} min ${currentStudent.result.timeTaken%60} sec`;
            if(navigator.share) navigator.share({ title: "My Test Result", text });
            else alert("Copy: "+text);
        });
    }

    loadData();
</script>
</body>
</html>
