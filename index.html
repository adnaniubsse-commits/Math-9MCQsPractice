<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Chemistry Exam System | 50 MCQs Bank | Random 16 Questions</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #f0f4ff 0%, #d9e2fb 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 20px 16px 40px;
            min-height: 100vh;
        }
        .container { max-width: 800px; margin: 0 auto; background: rgba(255,255,255,0.95); border-radius: 48px 32px; padding: 24px 20px 32px; box-shadow: 0 25px 45px rgba(0,0,0,0.15); }
        .logo-preview { width: 80px; height: 80px; background: #f8f3e0; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; border: 3px solid #ffd966; font-size: 2rem; }
        .welcome-text { font-size: 1.5rem; font-weight: 800; text-align: center; background: linear-gradient(135deg, #1e3c72, #2b5e8a); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .btn-group { display: flex; gap: 15px; justify-content: center; margin: 25px 0; flex-wrap: wrap; }
        .btn { border: none; font-weight: 700; padding: 12px 25px; border-radius: 60px; font-size: 1rem; cursor: pointer; background: white; box-shadow: 0 5px 12px rgba(0,0,0,0.1); min-width: 150px; }
        .btn-teacher { background: #2c3e66; color: white; }
        .btn-student { background: #e6b422; color: #2c2b28; }
        .btn-success { background: #28a745; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .form-card { background: #fefcf5; border-radius: 32px; padding: 20px; margin-top: 20px; }
        input, select { width: 100%; padding: 12px 16px; margin: 8px 0 16px; border-radius: 60px; border: 1px solid #ccc; font-size: 1rem; }
        .back-btn { background: #6c757d; color: white; margin-top: 15px; width: 100%; padding: 12px; border-radius: 40px; border: none; cursor: pointer; }
        .timer { font-size: 2rem; text-align: center; background: #1e3c72; color: white; padding: 10px; border-radius: 60px; margin-bottom: 20px; font-family: monospace; }
        .mcq-card { background: white; border-radius: 28px; padding: 20px; margin-bottom: 20px; border-left: 8px solid #e6b422; }
        .options label { display: block; margin: 10px 0; padding: 10px 15px; background: #f5f5f5; border-radius: 40px; cursor: pointer; }
        .options label:hover { background: #e0e0e0; }
        .result-card { background: linear-gradient(120deg, #f9f3e0, #fff2db); border-radius: 28px; padding: 24px; margin-top: 20px; border: 2px solid #ffcd7e; }
        .share-btn { background: #25D366; color: white; padding: 10px 20px; border-radius: 40px; border: none; cursor: pointer; margin-top: 15px; }
        .progress-bar { background: #e0e0e0; border-radius: 30px; height: 8px; margin: 15px 0; }
        .progress-fill { background: #28a745; border-radius: 30px; height: 8px; width: 0%; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid #ddd; }
        .warning { color: #c0392b; font-size: 0.75rem; margin-top: -10px; margin-bottom: 10px; }
        @media (max-width: 600px) { .btn { width: 100%; } }
    </style>
</head>
<body>
<div class="container" id="appRoot">Loading...</div>

<script>
    // ======================== 50 MCQ QUESTION BANK ========================
    const FULL_QUESTION_BANK = [
        { text: "Chemistry is the study of?", options: ["Living organisms", "Matter and its composition", "Stars and planets", "Rocks and minerals"], correct: 1 },
        { text: "The word Chemistry is derived from?", options: ["Greek word", "Latin word", "Arabic word Al-Kimiya", "French word"], correct: 2 },
        { text: "Which branch deals with carbon compounds?", options: ["Inorganic chemistry", "Organic chemistry", "Physical chemistry", "Analytical chemistry"], correct: 1 },
        { text: "The branch that studies metals and non-metals?", options: ["Organic", "Inorganic", "Physical", "Analytical"], correct: 1 },
        { text: "Physical chemistry deals with?", options: ["Rate of reactions", "Carbon compounds", "Metals", "Living systems"], correct: 0 },
        { text: "Analytical chemistry is concerned with?", options: ["Energy changes", "Separation and analysis", "Carbon compounds", "Nuclear reactions"], correct: 1 },
        { text: "Biochemistry is the study of?", options: ["Industrial chemicals", "Chemical processes in living organisms", "Atmospheric chemistry", "Soil chemistry"], correct: 1 },
        { text: "Which is a chemical change?", options: ["Melting of ice", "Boiling of water", "Rusting of iron", "Cutting of wood"], correct: 2 },
        { text: "Which is a physical change?", options: ["Burning of paper", "Cooking of food", "Dissolving sugar in water", "Rusting of iron"], correct: 2 },
        { text: "Father of Modern Chemistry is?", options: ["Jabir bin Hayyan", "Antoine Lavoisier", "John Dalton", "Robert Boyle"], correct: 1 },
        { text: "Jabir bin Hayyan is known as?", options: ["Father of Medicine", "Father of Chemistry", "Father of Physics", "Father of Biology"], correct: 1 },
        { text: "Industrial chemistry focuses on?", options: ["Small scale reactions", "Large scale manufacturing", "Theoretical concepts", "Atomic structure"], correct: 1 },
        { text: "Environmental chemistry studies?", options: ["Pollution and its control", "Drug development", "Polymer synthesis", "Metal extraction"], correct: 0 },
        { text: "Nuclear chemistry deals with?", options: ["Radioactive elements", "Carbon compounds", "Acids and bases", "Gases"], correct: 0 },
        { text: "Matter is anything that has?", options: ["Mass only", "Volume only", "Mass and volume", "Energy only"], correct: 2 },
        { text: "The three states of matter are?", options: ["Solid, Liquid, Gas", "Solid, Liquid, Plasma", "Solid, Liquid, Vapor", "Solid, Gas, Vapor"], correct: 0 },
        { text: "Which state has definite shape and volume?", options: ["Solid", "Liquid", "Gas", "Plasma"], correct: 0 },
        { text: "Which state has definite volume but indefinite shape?", options: ["Solid", "Liquid", "Gas", "Plasma"], correct: 1 },
        { text: "Which state has indefinite shape and indefinite volume?", options: ["Solid", "Liquid", "Gas", "Plasma"], correct: 2 },
        { text: "Particles in a solid are?", options: ["Tightly packed", "Loosely packed", "Far apart", "Randomly moving"], correct: 0 },
        { text: "Particles in a liquid can?", options: ["Only vibrate", "Slide past each other", "Move freely everywhere", "Fixed positions"], correct: 1 },
        { text: "Particles in a gas move?", options: ["Very slowly", "In fixed positions", "Rapidly and randomly", "Only in one direction"], correct: 2 },
        { text: "Solid to liquid is called?", options: ["Freezing", "Melting", "Evaporation", "Condensation"], correct: 1 },
        { text: "Liquid to solid is called?", options: ["Melting", "Freezing", "Boiling", "Sublimation"], correct: 1 },
        { text: "Liquid to gas is called?", options: ["Condensation", "Evaporation", "Freezing", "Melting"], correct: 1 },
        { text: "Gas to liquid is called?", options: ["Evaporation", "Sublimation", "Condensation", "Deposition"], correct: 2 },
        { text: "Solid directly to gas is called?", options: ["Condensation", "Evaporation", "Sublimation", "Deposition"], correct: 2 },
        { text: "Gas directly to solid is called?", options: ["Sublimation", "Deposition", "Condensation", "Freezing"], correct: 1 },
        { text: "Melting point of ice is?", options: ["0°C", "32°C", "100°C", "-10°C"], correct: 0 },
        { text: "Boiling point of water at sea level?", options: ["90°C", "95°C", "100°C", "110°C"], correct: 2 },
        { text: "Freezing point of water is?", options: ["0°C", "100°C", "32°C", "-10°C"], correct: 0 },
        { text: "Kinetic energy is highest in?", options: ["Solids", "Liquids", "Gases", "Same in all"], correct: 2 },
        { text: "Kinetic energy is lowest in?", options: ["Solids", "Liquids", "Gases", "Same in all"], correct: 0 },
        { text: "Intermolecular forces are strongest in?", options: ["Solids", "Liquids", "Gases", "Same in all"], correct: 0 },
        { text: "Intermolecular forces are weakest in?", options: ["Solids", "Liquids", "Gases", "Same in all"], correct: 2 },
        { text: "Diffusion is fastest in?", options: ["Solids", "Liquids", "Gases", "Same in all"], correct: 2 },
        { text: "Diffusion is slowest in?", options: ["Solids", "Liquids", "Gases", "Same in all"], correct: 0 },
        { text: "Dry ice (solid CO2) undergoes?", options: ["Melting", "Evaporation", "Sublimation", "Condensation"], correct: 2 },
        { text: "Which state is compressible?", options: ["Solid", "Liquid", "Gas", "None"], correct: 2 },
        { text: "Plasma is found in?", options: ["Stars", "Oceans", "Mountains", "Deserts"], correct: 0 },
        { text: "The fourth state of matter is?", options: ["Solid", "Liquid", "Gas", "Plasma"], correct: 3 },
        { text: "A scientific law is?", options: ["A guess", "Description of natural phenomenon", "An explanation", "A theory"], correct: 1 },
        { text: "Theory is?", options: ["A guess", "A well-tested explanation", "A law", "An observation"], correct: 1 },
        { text: "Which is NOT a branch of chemistry?", options: ["Organic", "Inorganic", "Biology", "Physical"], correct: 2 },
        { text: "The branch that deals with rate of reactions?", options: ["Organic", "Inorganic", "Physical", "Analytical"], correct: 2 },
        { text: "Who discovered oxygen?", options: ["Lavoisier", "Priestley", "Dalton", "Boyle"], correct: 1 },
        { text: "The smallest particle of an element is?", options: ["Atom", "Molecule", "Ion", "Electron"], correct: 0 },
        { text: "Which state has highest density?", options: ["Solid", "Liquid", "Gas", "Same"], correct: 0 },
        { text: "Which state has lowest density?", options: ["Solid", "Liquid", "Gas", "Same"], correct: 2 }
    ];

    // Helper functions
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function getRandomQuestions(count = 16) {
        let shuffled = shuffleArray([...FULL_QUESTION_BANK]);
        return shuffled.slice(0, count);
    }

    // Data storage
    let students = [];
    let results = [];
    let currentStudent = null;
    let currentView = "welcome";
    let activeQuestions = [];
    let studentAnswers = [];
    let currentQIndex = 0;
    let timerInterval = null;
    let timeLeft = 10;
    let testStartTime = null;

    function saveData() {
        localStorage.setItem("chemStudents", JSON.stringify(students));
        localStorage.setItem("chemResults", JSON.stringify(results));
    }

    function loadData() {
        let s = localStorage.getItem("chemStudents");
        let r = localStorage.getItem("chemResults");
        if (s) students = JSON.parse(s);
        if (r) results = JSON.parse(r);
    }

    function render() {
        const root = document.getElementById("appRoot");
        if (currentView === "welcome") root.innerHTML = renderWelcome();
        else if (currentView === "teacherLogin") root.innerHTML = renderTeacherLogin();
        else if (currentView === "teacherPanel") root.innerHTML = renderTeacherPanel();
        else if (currentView === "studentLogin") root.innerHTML = renderStudentLogin();
        else if (currentView === "studentRegister") root.innerHTML = renderStudentRegister();
        else if (currentView === "activeTest") root.innerHTML = renderActiveTest();
        else if (currentView === "studentResult") root.innerHTML = renderStudentResult();
        attachEvents();
    }

    function renderWelcome() {
        return `
            <div class="logo-preview">🧪</div>
            <div class="welcome-text">Chemistry Exam System</div>
            <div style="text-align:center; margin:10px 0;">Chapter 1: Introduction to Chemistry</div>
            <div style="text-align:center; font-size:0.8rem; color:#666;">📚 50 MCQ Bank | 🎲 16 Random Questions per Student</div>
            <div class="btn-group">
                <button class="btn btn-teacher" data-action="teacherLogin">👨‍🏫 Teacher Login</button>
                <button class="btn btn-student" data-action="studentLogin">📚 Student Login</button>
            </div>
        `;
    }

    function renderTeacherLogin() {
        return `
            <div class="form-card">
                <h3>🔐 Teacher Login</h3>
                <input type="password" id="teacherPass" placeholder="Enter Password">
                <button id="verifyTeacherBtn" class="btn btn-teacher" style="width:100%">Login</button>
                <button class="back-btn" data-action="backWelcome">Back</button>
            </div>
        `;
    }

    function renderTeacherPanel() {
        let studentList = '';
        students.forEach(s => {
            let studentResults = results.filter(r => r.studentId === s.id);
            let avgScore = studentResults.length ? (studentResults.reduce((a,b)=>a+b.score,0)/studentResults.length).toFixed(1) : 'No test';
            studentList += `<tr><td>${s.rollNo}</td><td>${s.name}</td><td>${s.fatherName}</td><td>${s.contact}</td><td>${avgScore}</td></tr>`;
        });
        
        return `
            <div class="form-card">
                <h3>📋 Teacher Dashboard</h3>
                <button id="addStudentBtn" class="btn btn-success" style="width:100%; margin-bottom:10px;">➕ Add New Student</button>
                <button id="viewResultsBtn" class="btn" style="width:100%; margin-bottom:10px; background:#17a2b8; color:white;">📊 View All Results</button>
                <button id="resetAllBtn" class="btn btn-danger" style="width:100%;">🔄 Reset All Data</button>
                <hr>
                <h4>📝 Registered Students</h4>
                <div style="overflow-x:auto;">
                    <table>
                        <tr><th>Roll No</th><th>Name</th><th>Father Name</th><th>Contact</th><th>Avg Score</th></tr>
                        ${studentList || '<tr><td colspan="5">No students registered</td></tr>'}
                    </table>
                </div>
                <button class="back-btn" data-action="backWelcome">Logout</button>
            </div>
        `;
    }

    function renderStudentLogin() {
        return `
            <div class="form-card">
                <h3>📚 Student Login</h3>
                <select id="studentSelect">
                    <option value="">Select Roll No / Name</option>
                    ${students.map(s => `<option value="${s.id}">${s.rollNo} - ${s.name}</option>`).join('')}
                </select>
                <button id="startTestBtn" class="btn btn-student" style="width:100%">Start Test</button>
                <button id="newStudentBtn" class="btn" style="width:100%; margin-top:10px;">➕ New Student? Register Here</button>
                <button class="back-btn" data-action="backWelcome">Back</button>
            </div>
        `;
    }

    function renderStudentRegister() {
        return `
            <div class="form-card">
                <h3>📝 New Student Registration</h3>
                <input type="text" id="regRollNo" placeholder="Roll Number *">
                <input type="text" id="regName" placeholder="Full Name *">
                <input type="text" id="regFatherName" placeholder="Father Name *">
                <input type="tel" id="regContact" placeholder="Contact Number *">
                <div class="warning">⚠️ All fields are required</div>
                <button id="registerBtn" class="btn btn-success" style="width:100%">Register & Start Test</button>
                <button class="back-btn" data-action="studentLogin">Back to Login</button>
            </div>
        `;
    }

    function renderActiveTest() {
        if (!activeQuestions.length) return "<div>Error loading test</div>";
        let q = activeQuestions[currentQIndex];
        let progress = ((currentQIndex + 1) / activeQuestions.length) * 100;
        return `
            <div class="timer">⏱️ ${timeLeft} seconds left</div>
            <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
            <div class="mcq-card">
                <h3>Question ${currentQIndex + 1} of ${activeQuestions.length}</h3>
                <p style="font-size:1.1rem; margin:15px 0;">${escapeHtml(q.text)}</p>
                <div class="options" id="optionsContainer">
                    ${q.options.map((opt, i) => `
                        <label>
                            <input type="radio" name="mcq" value="${i}">
                            ${String.fromCharCode(65 + i)}. ${escapeHtml(opt)}
                        </label>
                    `).join('')}
                </div>
                <button id="nextQuestionBtn" class="btn btn-success" style="width:100%; margin-top:15px;">Next →</button>
            </div>
        `;
    }

    function renderStudentResult() {
        let r = currentStudent.currentResult;
        let percentage = Math.round((r.score / r.total) * 100);
        return `
            <div class="result-card">
                <div style="text-align:center; margin-bottom:15px;">
                    <div class="logo-preview" style="width:60px; height:60px; font-size:1.5rem;">🧪</div>
                    <h2>🧪 Test Result</h2>
                </div>
                <p><strong>Student:</strong> ${escapeHtml(currentStudent.name)} (Roll No: ${currentStudent.rollNo})</p>
                <p><strong>Father Name:</strong> ${escapeHtml(currentStudent.fatherName)}</p>
                <p><strong>Contact:</strong> ${currentStudent.contact}</p>
                <hr>
                <h3>📊 Score: ${r.score} / ${r.total}</h3>
                <h3>📈 Percentage: ${percentage}%</h3>
                <p><strong>⏱️ Time Taken:</strong> ${Math.floor(r.timeTaken / 60)} minutes ${r.timeTaken % 60} seconds</p>
                <hr>
                <div><strong>❌ Incorrect Answers:</strong></div>
                <ul>
                    ${r.wrongList.map(w => `<li><strong>Q${w.qno}:</strong> ${escapeHtml(w.question)}<br>👉 Your answer: ${escapeHtml(w.yourAnswer)}<br>✅ Correct: ${escapeHtml(w.correctAnswer)}</li>`).join('')}
                </ul>
                <button id="shareWhatsAppBtn" class="share-btn">📤 Share Result on WhatsApp</button>
                <button class="back-btn" data-action="backWelcome">🏠 Back to Home</button>
            </div>
        `;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timeLeft = 10;
        timerInterval = setInterval(() => {
            if (currentView !== "activeTest") {
                clearInterval(timerInterval);
                return;
            }
            timeLeft--;
            const timerEl = document.querySelector(".timer");
            if (timerEl) timerEl.innerHTML = `⏱️ ${timeLeft} seconds left`;
            
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                autoMoveToNext();
            }
        }, 1000);
    }

    function autoMoveToNext() {
        // Save current answer if any
        let selected = document.querySelector('input[name="mcq"]:checked');
        if (selected) {
            studentAnswers[currentQIndex] = parseInt(selected.value);
        } else {
            studentAnswers[currentQIndex] = -1;
        }
        
        // Move to next question or finish
        if (currentQIndex + 1 < activeQuestions.length) {
            currentQIndex++;
            timeLeft = 10;
            render();
            startTimer();
        } else {
            finishTest();
        }
    }

    function finishTest() {
        clearInterval(timerInterval);
        
        // Save last answer
        let selected = document.querySelector('input[name="mcq"]:checked');
        if (selected) {
            studentAnswers[currentQIndex] = parseInt(selected.value);
        } else if (studentAnswers[currentQIndex] === undefined) {
            studentAnswers[currentQIndex] = -1;
        }
        
        // Calculate score
        let correctCount = 0;
        let wrongList = [];
        for (let i = 0; i < activeQuestions.length; i++) {
            let q = activeQuestions[i];
            let userAnswer = studentAnswers[i];
            if (userAnswer === q.correct) {
                correctCount++;
            } else {
                wrongList.push({
                    qno: i + 1,
                    question: q.text,
                    yourAnswer: userAnswer !== -1 ? q.options[userAnswer] : "Not answered",
                    correctAnswer: q.options[q.correct]
                });
            }
        }
        
        let timeTaken = Math.floor((Date.now() - testStartTime) / 1000);
        
        let result = {
            studentId: currentStudent.id,
            studentName: currentStudent.name,
            rollNo: currentStudent.rollNo,
            score: correctCount,
            total: activeQuestions.length,
            percentage: Math.round((correctCount / activeQuestions.length) * 100),
            timeTaken: timeTaken,
            wrongList: wrongList,
            date: new Date().toISOString()
        };
        
        results.push(result);
        saveData();
        
        currentStudent.currentResult = result;
        currentView = "studentResult";
        render();
    }

    function startTest(student) {
        currentStudent = student;
        activeQuestions = getRandomQuestions(16);
        studentAnswers = new Array(16).fill(-1);
        currentQIndex = 0;
        timeLeft = 10;
        testStartTime = Date.now();
        currentView = "activeTest";
        render();
        startTimer();
    }

    function attachEvents() {
        // Welcome screen buttons
        document.querySelectorAll("[data-action='teacherLogin']").forEach(el => {
            el.onclick = () => { currentView = "teacherLogin"; render(); };
        });
        document.querySelectorAll("[data-action='studentLogin']").forEach(el => {
            el.onclick = () => { currentView = "studentLogin"; render(); };
        });
        document.querySelectorAll("[data-action='backWelcome']").forEach(el => {
            el.onclick = () => { currentView = "welcome"; render(); };
        });
        
        // Teacher verification
        document.getElementById("verifyTeacherBtn")?.addEventListener("click", () => {
            let pass = document.getElementById("teacherPass").value;
            if (pass === "2247") {
                currentView = "teacherPanel";
                render();
            } else {
                alert("Wrong password! Use: 2247");
            }
        });
        
        // Teacher panel buttons
        document.getElementById("addStudentBtn")?.addEventListener("click", () => {
            currentView = "studentRegister";
            render();
        });
        
        document.getElementById("viewResultsBtn")?.addEventListener("click", () => {
            if (results.length === 0) {
                alert("No results yet!");
                return;
            }
            let resultHtml = "<h4>📊 All Student Results</h4><div style='overflow-x:auto;'><table><tr><th>Date</th><th>Roll No</th><th>Name</th><th>Score</th><th>Percentage</th><th>Time</th></tr>";
            results.slice().reverse().forEach(r => {
                resultHtml += `<tr><td>${new Date(r.date).toLocaleDateString()}</td><td>${r.rollNo}</td><td>${r.studentName}</td><td>${r.score}/${r.total}</td><td>${r.percentage}%</td><td>${Math.floor(r.timeTaken/60)}:${r.timeTaken%60}</td></tr>`;
            });
            resultHtml += "</table></div><button id='closeResultsBtn' class='btn' style='margin-top:15px;'>Close</button>";
            document.getElementById("teacherPanelContent")?.remove();
            let panel = document.querySelector(".form-card");
            let resultsDiv = document.createElement("div");
            resultsDiv.innerHTML = resultHtml;
            panel.appendChild(resultsDiv);
            document.getElementById("closeResultsBtn")?.addEventListener("click", () => { render(); });
        });
        
        document.getElementById("resetAllBtn")?.addEventListener("click", () => {
            if (confirm("⚠️ WARNING: This will delete ALL students and results! Continue?")) {
                students = [];
                results = [];
                saveData();
                alert("All data reset!");
                render();
            }
        });
        
        // Student login
        document.getElementById("startTestBtn")?.addEventListener("click", () => {
            let studentId = document.getElementById("studentSelect").value;
            if (!studentId) {
                alert("Please select a student");
                return;
            }
            let student = students.find(s => s.id == studentId);
            if (student) {
                startTest(student);
            }
        });
        
        document.getElementById("newStudentBtn")?.addEventListener("click", () => {
            currentView = "studentRegister";
            render();
        });
        
        // Student registration
        document.getElementById("registerBtn")?.addEventListener("click", () => {
            let rollNo = document.getElementById("regRollNo").value.trim();
            let name = document.getElementById("regName").value.trim();
            let fatherName = document.getElementById("regFatherName").value.trim();
            let contact = document.getElementById("regContact").value.trim();
            
            if (!rollNo || !name || !fatherName || !contact) {
                alert("Please fill all fields");
                return;
            }
            
            let newStudent = {
                id: Date.now(),
                rollNo: rollNo,
                name: name,
                fatherName: fatherName,
                contact: contact
            };
            students.push(newStudent);
            saveData();
            startTest(newStudent);
        });
        
        // Next question button
        document.getElementById("nextQuestionBtn")?.addEventListener("click", () => {
            let selected = document.querySelector('input[name="mcq"]:checked');
            if (selected) {
                studentAnswers[currentQIndex] = parseInt(selected.value);
            } else {
                studentAnswers[currentQIndex] = -1;
            }
            
            if (currentQIndex + 1 < activeQuestions.length) {
                currentQIndex++;
                timeLeft = 10;
                render();
                startTimer();
            } else {
                finishTest();
            }
        });
        
        // Share result on WhatsApp
        document.getElementById("shareWhatsAppBtn")?.addEventListener("click", () => {
            let r = currentStudent.currentResult;
            let msg = `🧪 Test Result - ${currentStudent.name} (Roll: ${currentStudent.rollNo})\n📊 Score: ${r.score}/${r.total}\n📈 Percentage: ${Math.round(r.score/r.total*100)}%\n⏱️ Time: ${Math.floor(r.timeTaken/60)} min ${r.timeTaken%60} sec\n🏫 Teachers Academy`;
            let url = `https://wa.me/?text=${encodeURIComponent(msg)}`;
            window.open(url, '_blank');
        });
    }

    loadData();
    render();
</script>
</body>
</html>
