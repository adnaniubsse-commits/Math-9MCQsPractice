<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Teachers Academy Bahawalpur | Math MCQs</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: linear-gradient(145deg, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            padding: 20px 16px 40px;
            min-height: 100vh;
        }
        .container { max-width: 850px; margin: 0 auto; background: rgba(255,255,255,0.95); border-radius: 48px 32px; padding: 24px 20px 32px; box-shadow: 0 25px 45px rgba(0,0,0,0.3); backdrop-filter: blur(10px); }
        .logo-area { text-align: center; margin-bottom: 20px; }
        .logo-preview { width: 100px; height: 100px; background: linear-gradient(135deg, #ffd89b, #c7e9fb); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; border: 3px solid gold; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .logo-preview img { max-width: 95%; max-height: 95%; object-fit: contain; }
        .welcome-text { font-size: 1.8rem; font-weight: 800; text-align: center; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .academy-name { text-align: center; font-size: 1rem; color: #b8860b; margin-top: 5px; }
        .btn-group { display: flex; gap: 20px; justify-content: center; margin: 30px 0; flex-wrap: wrap; }
        .btn { border: none; font-weight: 700; padding: 14px 30px; border-radius: 60px; font-size: 1.1rem; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.2); min-width: 160px; }
        .btn:active { transform: scale(0.96); }
        .btn-teacher { background: linear-gradient(135deg, #1e3c72, #2b5e8a); color: white; }
        .btn-student { background: linear-gradient(135deg, #f7971e, #ffd200); color: #2c2b28; }
        .btn-success { background: linear-gradient(135deg, #11998e, #38ef7d); color: white; }
        .btn-danger { background: linear-gradient(135deg, #cb2d3e, #ef473a); color: white; }
        .btn-warning { background: linear-gradient(135deg, #f2994a, #f2c94c); color: #2c2b28; }
        .form-card { background: #fefcf5; border-radius: 32px; padding: 25px; margin-top: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 14px 18px; margin: 8px 0 16px; border-radius: 60px; border: 1px solid #ddd; font-size: 1rem; background: white; }
        .warning { color: #c0392b; font-size: 0.7rem; margin-top: -12px; margin-bottom: 12px; }
        .chapter-grid { display: flex; flex-wrap: wrap; gap: 12px; margin: 20px 0; max-height: 450px; overflow-y: auto; }
        .chapter-btn { background: linear-gradient(135deg, #667eea, #764ba2); border: none; padding: 15px 20px; border-radius: 50px; font-weight: 600; color: white; flex: 1 0 auto; min-width: 140px; cursor: pointer; font-size: 0.9rem; transition: transform 0.1s; }
        .chapter-btn:active { transform: scale(0.97); }
        .chapter-btn.disabled { opacity: 0.5; background: #999; cursor: not-allowed; }
        .mcq-question { background: white; border-radius: 28px; padding: 20px; margin-bottom: 20px; border-left: 8px solid #f7971e; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .options label { display: block; margin: 10px 0; padding: 12px 18px; background: #f8f9fa; border-radius: 50px; cursor: pointer; transition: background 0.2s; }
        .options label:hover { background: #e9ecef; }
        .submit-test { background: linear-gradient(135deg, #11998e, #38ef7d); color: white; width: 100%; padding: 16px; font-size: 1.2rem; border-radius: 60px; margin: 20px 0 10px; border: none; cursor: pointer; }
        .result-card { background: linear-gradient(135deg, #f9f3e0, #fff2db); border-radius: 28px; padding: 25px; margin-top: 20px; border: 2px solid #ffd700; }
        .back-btn { background: #6c757d; color: white; margin-top: 15px; width: 100%; padding: 12px; border-radius: 60px; border: none; cursor: pointer; }
        .teacher-data { background: #1e2a3a; color: #eee; border-radius: 28px; padding: 20px; overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #444; }
        .score-badge { background: #28a745; color: white; border-radius: 30px; padding: 4px 12px; font-size: 0.7rem; display: inline-block; }
        .request-badge { background: #ffc107; color: #2c2b28; border-radius: 30px; padding: 4px 12px; font-size: 0.7rem; display: inline-block; }
        .timer { font-size: 1.5rem; text-align: center; background: #1e3c72; color: white; padding: 10px; border-radius: 60px; margin-bottom: 20px; }
        .progress-bar { background: #e0e0e0; border-radius: 30px; height: 8px; margin: 15px 0; }
        .progress-fill { background: #28a745; border-radius: 30px; height: 8px; width: 0%; }
        @media (max-width: 600px) { .btn { width: 100%; } .container { padding: 16px; } .chapter-btn { min-width: 100%; } }
        .flex-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
    </style>
</head>
<body>
<div class="container" id="appRoot">Loading...</div>

<script>
    // ======================== CHAPTER WISE MCQs (Mathematics 9th) ========================
    const MATH_CHAPTERS = {
        "chap1": { name: "📐 Ch 1: Matrices & Determinants", questions: [
            { text: "The order of matrix [2 3; -5 6] is?", options: ["1-by-2", "2-by-1", "1-by-2", "2-by-2"], correct: 3 },
            { text: "Which is order of a square matrix?", options: ["1-by-2", "2-by-1", "2-by-2", "3-by-2"], correct: 2 },
            { text: "Adjoint of [1 2; 3 4] is?", options: ["[-1 2; 0 -1]", "[-1 -2; 0 1]", "[-1 -2; 0 -1]", "[-1 -2; 0 1]"], correct: 3 },
            { text: "If [2 6; 3 x] = 0, then x is?", options: ["-9", "6", "-6", "9"], correct: 3 }
        ]},
        "chap2": { name: "🔢 Ch 2: Real & Complex Numbers", questions: [
            { text: "√7 is a?", options: ["Integer", "Rational", "Irrational", "Natural"], correct: 2 },
            { text: "The conjugate of 5+4i is?", options: ["5+4i", "√5-4i", "-5-4i", "-5+4i"], correct: 3 },
            { text: "The value of i⁹ is?", options: ["-i", "i", "-1", "1"], correct: 3 },
            { text: "Every real number is?", options: ["complex", "negative integer", "rational", "positive integer"], correct: 0 }
        ]},
        "chap3": { name: "📈 Ch 3: Logarithms", questions: [
            { text: "The base of common logarithm is?", options: ["2", "10", "5", "e"], correct: 1 },
            { text: "log 100 = ?", options: ["2", "3", "10", "1"], correct: 0 },
            { text: "log 1 = ?", options: ["0", "1", "10", "e"], correct: 0 },
            { text: "log 5 + log 3 = ?", options: ["log 0", "log 2", "log(5/3)", "log 15"], correct: 3 }
        ]},
        "chap4": { name: "✖️ Ch 4: Algebraic Expressions", questions: [
            { text: "The degree of polynomial 4x⁴+2x²y is?", options: ["1", "2", "3", "4"], correct: 3 },
            { text: "a³+b³ is equal to?", options: ["(a-b)(a²+ab+b²)", "(a+b)(a²-ab+b²)", "(a-b)(a²-ab+b²)", "(a-b)(a²+ab-b²)"], correct: 1 },
            { text: "(3+√2)(3-√2) is equal to?", options: ["7", "-7", "-1", "1"], correct: 0 }
        ]},
        "chap5": { name: "🔍 Ch 5: Factorization", questions: [
            { text: "The factors of x²-5x+6 are?", options: ["(x+2)(x+3)", "(x+6)(x-1)", "(x-2)(x-3)", "(x+1)(x-6)"], correct: 2 },
            { text: "Factors of 3x²-x-2 are?", options: ["(x-1)(3x+2)", "(x-1)(3x-2)", "(x+1)(3x+2)", "(x+1)(3x-2)"], correct: 3 },
            { text: "Find m so that x²+4x+m is a complete square?", options: ["1", "6", "4", "-8"], correct: 2 }
        ]},
        "chap6": { name: "⚙️ Ch 6: Algebraic Manipulation", questions: [
            { text: "HCF of 20x³y³ and 5x²y² is?", options: ["15xy", "100x⁵y⁵", "20x³y³", "5x²y²"], correct: 3 },
            { text: "Simplify (a²+5a-14)/(a²-3a-18) = ?", options: ["a+2", "a+3", "a+7", "a+7"], correct: 2 },
            { text: "Square root of a²-2a+1 is?", options: ["±(a+1)", "±(a-1)", "a-1", "a+1"], correct: 1 }
        ]},
        "chap7": { name: "⚖️ Ch 7: Linear Equations", questions: [
            { text: "Solution of 5x-10=10 is?", options: ["0", "50", "4", "-4"], correct: 2 },
            { text: "If 7x+4 < 6x+6, then x belongs to?", options: ["(2,∞)", "[2,∞)", "(-∞,2)", "(-∞,2]"], correct: 2 },
            { text: "Solve: 12x+30 = -6", options: ["x=2", "x=-3", "x=4", "x=-2"], correct: 1 }
        ]},
        "chap8": { name: "📍 Ch 8: Coordinate Geometry", questions: [
            { text: "Distance between P(1,2) and Q(4,6) is?", options: ["5", "6", "√13", "4"], correct: 0 },
            { text: "Midpoint of (-2,4) and (6,-2) is?", options: ["(4,2)", "(2,1)", "(1,1)", "(0,0)"], correct: 1 },
            { text: "Slope of line y=5x+3 is?", options: ["3", "-3", "5", "-5"], correct: 2 }
        ]}
    };

    // ======================== DATA STORAGE ========================
    let students = [];
    let chapterAttempts = {};
    let reattemptRequests = {};
    let currentStudent = null;
    let currentView = "welcome";
    let currentChapter = null;
    let currentQuestions = [];
    let userAnswers = [];
    let resultData = null;
    let timerInterval = null;
    let logoDataURL = null;

    function loadData() {
        try {
            let s = localStorage.getItem("TAMath_Students");
            let c = localStorage.getItem("TAMath_Attempts");
            let r = localStorage.getItem("TAMath_Requests");
            let l = localStorage.getItem("TAMath_Logo");
            if (s) students = JSON.parse(s);
            if (c) chapterAttempts = JSON.parse(c);
            if (r) reattemptRequests = JSON.parse(r);
            if (l) logoDataURL = l;
        } catch(e) {}
        if (!students) students = [];
        if (!chapterAttempts) chapterAttempts = {};
        if (!reattemptRequests) reattemptRequests = {};
    }

    function saveData() {
        localStorage.setItem("TAMath_Students", JSON.stringify(students));
        localStorage.setItem("TAMath_Attempts", JSON.stringify(chapterAttempts));
        localStorage.setItem("TAMath_Requests", JSON.stringify(reattemptRequests));
        if (logoDataURL) localStorage.setItem("TAMath_Logo", logoDataURL);
    }

    function getAttemptsLeft(phone, chapterId) {
        return Math.max(0, 2 - (chapterAttempts[`${phone}_${chapterId}`] || 0));
    }

    function incrementAttempt(phone, chapterId) {
        chapterAttempts[`${phone}_${chapterId}`] = (chapterAttempts[`${phone}_${chapterId}`] || 0) + 1;
        saveData();
    }

    function hasRequested(phone, chapterId) {
        return reattemptRequests[`${phone}_${chapterId}`] === true;
    }

    function setRequest(phone, chapterId, val) {
        reattemptRequests[`${phone}_${chapterId}`] = val;
        saveData();
    }

    function render() {
        const root = document.getElementById("appRoot");
        if (currentView === "welcome") root.innerHTML = renderWelcome();
        else if (currentView === "teacherPanel") root.innerHTML = renderTeacherPanel();
        else if (currentView === "studentForm") root.innerHTML = renderStudentForm();
        else if (currentView === "testPanel") root.innerHTML = renderTestPanel();
        else if (currentView === "resultPanel") root.innerHTML = renderResultPanel();
        attachEvents();
    }

    function renderWelcome() {
        const logoHtml = logoDataURL ? `<img src="${logoDataURL}" alt="Logo">` : '<div style="font-size:2rem;">🏫</div>';
        return `
            <div class="logo-area">
                <div class="logo-preview" id="logoPreview">${logoHtml}</div>
                <input type="file" id="logoUpload" accept="image/*" style="display:none">
                <button id="uploadLogoBtn" style="background:#e6b422; border:none; padding:5px 15px; border-radius:30px; margin-top:5px; cursor:pointer;">📤 Upload Academy Logo</button>
            </div>
            <div class="welcome-text">✨ Teachers Academy ✨</div>
            <div class="academy-name">Bahawalpur | Excellence in Mathematics</div>
            <div style="text-align:center; margin:10px 0; font-size:0.8rem;">📚 Chapter-wise MCQ Practice | 2 Attempts per Chapter</div>
            <div class="btn-group">
                <button class="btn btn-teacher" id="teacherBtn">👨‍🏫 Teacher</button>
                <button class="btn btn-student" id="studentBtn">📚 Student</button>
            </div>
        `;
    }

    function renderTeacherPanel() {
        let studentsList = '';
        students.forEach(s => {
            studentsList += `<tr><td>${escapeHtml(s.name)}</td><td>${escapeHtml(s.fatherName)}</td><td>${s.phone}</td><td>${escapeHtml(s.school)}</td><td>${escapeHtml(s.city)}</td></tr>`;
        });
        
        let requestsHtml = '';
        for (let [key, val] of Object.entries(reattemptRequests)) {
            if (val === true) {
                let [phone, chapId] = key.split("_");
                let student = students.find(s => s.phone === phone);
                let chapName = MATH_CHAPTERS[chapId]?.name || chapId;
                requestsHtml += `<li>${student?.name || phone} - Request for ${chapName} <button data-key="${key}" class="approveReqBtn" style="background:#28a745; color:white; border:none; padding:5px 15px; border-radius:20px; margin-left:10px;">✅ Approve</button></li>`;
            }
        }
        if (!requestsHtml) requestsHtml = "<li>No pending requests</li>";
        
        return `
            <div class="form-card">
                <h3>🔐 Teacher Dashboard</h3>
                <input type="password" id="teacherPass" placeholder="Enter Password">
                <button id="verifyTeacherBtn" class="btn btn-teacher" style="width:100%">Unlock</button>
                <div id="teacherContent" style="display:none; margin-top:20px;">
                    <h4>📊 All Students Data</h4>
                    <div class="teacher-data">
                        <table><tr><th>Name</th><th>Father</th><th>Phone</th><th>School</th><th>City</th></tr>${studentsList}</table>
                    </div>
                    <h4>🔄 Reattempt Requests</h4>
                    <ul>${requestsHtml}</ul>
                    <button id="downloadDataBtn" class="btn btn-success" style="width:100%">📥 Download Student Data (Excel)</button>
                </div>
                <button class="back-btn" id="backFromTeacher">⬅ Back</button>
            </div>
        `;
    }

    function renderStudentForm() {
        return `
            <div class="form-card">
                <h3>📝 Student Registration</h3>
                <input type="text" id="stdName" placeholder="Full Name *">
                <input type="text" id="stdFather" placeholder="Father Name *">
                <input type="tel" id="stdPhone" placeholder="03XX-XXXXXXX *">
                <div class="warning">⚠️ Warning: Use correct number. Result card will be sent via SMS. Max 3 students per number.</div>
                <input type="text" id="stdSchool" placeholder="School Name *">
                <input type="text" id="stdCity" placeholder="City" value="Bahawalpur">
                <button id="registerStudentBtn" class="btn btn-student" style="width:100%">✅ Continue to Tests</button>
                <button class="back-btn" id="backFromStudent">⬅ Back</button>
            </div>
        `;
    }

    function renderTestPanel() {
        if (!currentStudent) return "<div>Error</div>";
        if (!currentChapter) {
            let chapHtml = `<div class="form-card"><h3>📘 Welcome ${escapeHtml(currentStudent.name)}</h3><div style="background:#e8f0fe; padding:10px; border-radius:20px; margin-bottom:15px; text-align:center;">📌 Select a chapter to start the test</div><div class="chapter-grid">`;
            for (let [key, chap] of Object.entries(MATH_CHAPTERS)) {
                let left = getAttemptsLeft(currentStudent.phone, key);
                let status = left === 0 ? "❌ Attempts exhausted" : left === 1 ? "⚠️ 1 attempt left" : "✅ 2 attempts left";
                let requested = hasRequested(currentStudent.phone, key) ? " 🔔 Request Pending" : "";
                let disabled = left === 0 && !hasRequested(currentStudent.phone, key);
                chapHtml += `<button data-chapter="${key}" class="chapter-btn" ${disabled ? 'disabled style="opacity:0.5;"' : ''}>${chap.name}<br><span class="score-badge">${status}${requested}</span></button>`;
            }
            chapHtml += `</div><button class="back-btn" id="logoutFromTests">🚪 Logout</button></div>`;
            return chapHtml;
        } else {
            let chap = MATH_CHAPTERS[currentChapter];
            let html = `<div class="form-card"><h3>${chap.name}</h3><div class="progress-bar"><div class="progress-fill" style="width:${(userAnswers.filter(a=>a!==-1).length/chap.questions.length)*100}%"></div></div><p>✅ Attempted: ${userAnswers.filter(a=>a!==-1).length}/${chap.questions.length}</p>`;
            chap.questions.forEach((q, idx) => {
                let selected = userAnswers[idx] !== undefined ? userAnswers[idx] : -1;
                html += `<div class="mcq-question"><strong>${idx+1}. ${escapeHtml(q.text)}</strong><div class="options">`;
                q.options.forEach((opt, optIdx) => {
                    let letter = String.fromCharCode(65+optIdx);
                    html += `<label><input type="radio" name="q${idx}" value="${optIdx}" ${selected===optIdx ? 'checked' : ''}> ${letter}. ${escapeHtml(opt)}</label>`;
                });
                html += `</div></div>`;
            });
            html += `<button id="submitTestBtn" class="submit-test">📊 Submit Test & Get Result</button><button class="back-btn" id="backToChapters">◀ Back to Chapters</button></div>`;
            return html;
        }
    }

    function renderResultPanel() {
        if (!resultData) return "<div>Error</div>";
        let chap = MATH_CHAPTERS[resultData.chapterId];
        let left = getAttemptsLeft(currentStudent.phone, resultData.chapterId);
        let requested = hasRequested(currentStudent.phone, resultData.chapterId);
        
        let html = `<div class="result-card"><div style="display:flex; align-items:center; gap:15px; margin-bottom:20px;"><div class="logo-preview" style="width:50px; height:50px;">🏫</div><div><strong>Teachers Academy Bahawalpur</strong><br>${currentStudent.school} | ${currentStudent.city}</div></div>
            <h3>🎓 Result Card</h3>
            <p><strong>Student:</strong> ${escapeHtml(currentStudent.name)}<br><strong>Father:</strong> ${escapeHtml(currentStudent.fatherName)}<br><strong>Contact:</strong> ${currentStudent.phone}</p>
            <p><strong>Chapter:</strong> ${chap.name}</p>
            <p><strong>Score:</strong> ${resultData.score} / ${resultData.total}</p>
            <p>✅ Correct: ${resultData.correctCount} &nbsp;| ❌ Wrong: ${resultData.wrongCount}</p>`;
        
        if (resultData.wrongList.length > 0) {
            html += `<div style="margin-top:15px;"><strong>⚠️ Incorrect Attempts & Correct Options:</strong><ul>`;
            resultData.wrongList.forEach(w => {
                html += `<li><strong>Q${w.qno}:</strong> ${escapeHtml(w.question)}<br>👉 Your: ${escapeHtml(w.yourAnswer)} &nbsp; ✅ Correct: ${escapeHtml(w.correctAnswer)}</li>`;
            });
            html += `</ul></div>`;
        } else {
            html += `<p>🏆 Perfect score! Excellent work!</p>`;
        }
        
        if (left > 0 && !requested) {
            html += `<button id="reattemptBtn" class="btn btn-warning" style="width:100%; margin-top:15px;">🔄 Re-attempt (${left} attempt left)</button>`;
        } else if (left === 0 && !requested) {
            html += `<button id="requestReattemptBtn" class="btn btn-danger" style="width:100%; margin-top:15px;">📢 Request Re-attempt to Teacher</button>`;
        } else if (requested) {
            html += `<div style="background:#ffe0b3; padding:12px; border-radius:30px; margin-top:15px; text-align:center;">⏳ Request sent to teacher. Please wait for approval.</div>`;
        }
        
        html += `<button class="back-btn" id="homeFromResult">🏠 Back to Home</button>
                 <button id="shareResultBtn" class="btn btn-success" style="width:100%; margin-top:10px;">📤 Share Result on WhatsApp</button></div>`;
        
        // Simulate SMS send
        setTimeout(() => {
            alert(`📱 Result card sent to ${currentStudent.phone}\nFrom: Teachers Academy Bahawalpur\nScore: ${resultData.score}/${resultData.total}`);
        }, 100);
        
        return html;
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }

    function checkUnansweredAndReturn() {
        let qs = MATH_CHAPTERS[currentChapter].questions;
        let unanswered = [];
        for (let i = 0; i < qs.length; i++) {
            let sel = document.querySelector(`input[name="q${i}"]:checked`);
            if (sel) userAnswers[i] = parseInt(sel.value);
            else { userAnswers[i] = -1; unanswered.push(i+1); }
        }
        if (unanswered.length > 0) {
            alert(`⚠️ Please attempt all MCQs!\nUnattempted questions: ${unanswered.join(", ")}`);
            render();
            return false;
        }
        return true;
    }

    function finishTest() {
        let qs = MATH_CHAPTERS[currentChapter].questions;
        let correctCount = 0, wrongList = [];
        for (let i = 0; i < qs.length; i++) {
            if (userAnswers[i] === qs[i].correct) correctCount++;
            else wrongList.push({
                qno: i+1,
                question: qs[i].text,
                yourAnswer: userAnswers[i] !== -1 ? qs[i].options[userAnswers[i]] : "Not answered",
                correctAnswer: qs[i].options[qs[i].correct]
            });
        }
        resultData = {
            chapterId: currentChapter,
            total: qs.length,
            score: correctCount,
            correctCount: correctCount,
            wrongCount: qs.length - correctCount,
            wrongList: wrongList
        };
        incrementAttempt(currentStudent.phone, currentChapter);
        currentView = "resultPanel";
        render();
    }

    function startTest() {
        currentChapter = null;
        currentQuestions = [];
        userAnswers = [];
        resultData = null;
        currentView = "testPanel";
        render();
    }

    function attachEvents() {
        // Welcome screen
        document.getElementById("uploadLogoBtn")?.addEventListener("click", () => { document.getElementById("logoUpload").click(); });
        document.getElementById("logoUpload")?.addEventListener("change", (e) => {
            let file = e.target.files[0];
            if (file) {
                let reader = new FileReader();
                reader.onload = (ev) => { logoDataURL = ev.target.result; saveData(); render(); };
                reader.readAsDataURL(file);
            }
        });
        document.getElementById("teacherBtn")?.addEventListener("click", () => { currentView = "teacherPanel"; render(); });
        document.getElementById("studentBtn")?.addEventListener("click", () => { currentView = "studentForm"; render(); });
        
        // Teacher panel
        document.getElementById("verifyTeacherBtn")?.addEventListener("click", () => {
            let pass = document.getElementById("teacherPass").value;
            if (pass === "2247") {
                document.getElementById("teacherContent").style.display = "block";
                alert("Access Granted!");
            } else alert("Wrong password! Use: 2247");
        });
        document.getElementById("backFromTeacher")?.addEventListener("click", () => { currentView = "welcome"; render(); });
        document.getElementById("downloadDataBtn")?.addEventListener("click", () => {
            let csv = "Name,Father Name,Phone,School,City\n" + students.map(s => `${s.name},${s.fatherName},${s.phone},${s.school},${s.city}`).join("\n");
            let blob = new Blob([csv], {type: "text/csv"});
            let a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "students_data.csv";
            a.click();
        });
        
        // Approve requests (dynamic)
        document.querySelectorAll(".approveReqBtn").forEach(btn => {
            btn.onclick = () => {
                let key = btn.getAttribute("data-key");
                if (key) {
                    setRequest(key.split("_")[0], key.split("_")[1], false);
                    chapterAttempts[key] = 0;
                    saveData();
                    alert("✅ Request approved! Student can reattempt.");
                    render();
                }
            };
        });
        
        // Student registration
        document.getElementById("registerStudentBtn")?.addEventListener("click", () => {
            let name = document.getElementById("stdName").value.trim();
            let father = document.getElementById("stdFather").value.trim();
            let phone = document.getElementById("stdPhone").value.trim();
            let school = document.getElementById("stdSchool").value.trim();
            let city = document.getElementById("stdCity").value.trim() || "Bahawalpur";
            
            if (!name || !father || !phone || !school) { alert("Please fill all fields"); return; }
            if (!/^03\d{2}-\d{7}$/.test(phone)) { alert("Use format: 03XX-XXXXXXX"); return; }
            
            let samePhoneCount = students.filter(s => s.phone === phone).length;
            if (samePhoneCount >= 3) { alert("This phone number already used by 3 students."); return; }
            
            currentStudent = { id: Date.now(), name, fatherName: father, phone, school, city };
            students.push(currentStudent);
            saveData();
            startTest();
        });
        document.getElementById("backFromStudent")?.addEventListener("click", () => { currentView = "welcome"; render(); });
        
        // Chapter selection
        document.querySelectorAll("[data-chapter]").forEach(btn => {
            btn.onclick = () => {
                let chapId = btn.getAttribute("data-chapter");
                let left = getAttemptsLeft(currentStudent.phone, chapId);
                if (left <= 0 && !hasRequested(currentStudent.phone, chapId)) {
                    alert("No attempts left! Please request reattempt from teacher.");
                    return;
                }
                currentChapter = chapId;
                currentQuestions = MATH_CHAPTERS[chapId].questions;
                userAnswers = new Array(currentQuestions.length).fill(-1);
                resultData = null;
                render();
            };
        });
        
        // Submit test
        document.getElementById("submitTestBtn")?.addEventListener("click", () => {
            if (checkUnansweredAndReturn()) finishTest();
        });
        
        document.getElementById("backToChapters")?.addEventListener("click", () => { currentChapter = null; render(); });
        document.getElementById("logoutFromTests")?.addEventListener("click", () => { currentView = "welcome"; currentStudent = null; render(); });
        document.getElementById("homeFromResult")?.addEventListener("click", () => { currentView = "welcome"; currentStudent = null; render(); });
        
        document.getElementById("reattemptBtn")?.addEventListener("click", () => {
            let left = getAttemptsLeft(currentStudent.phone, resultData.chapterId);
            if (left > 0) {
                currentChapter = resultData.chapterId;
                userAnswers = new Array(MATH_CHAPTERS[resultData.chapterId].questions.length).fill(-1);
                resultData = null;
                render();
            }
        });
        
        document.getElementById("requestReattemptBtn")?.addEventListener("click", () => {
            setRequest(currentStudent.phone, resultData.chapterId, true);
            alert("Request sent to Teacher!");
            render();
        });
        
        document.getElementById("shareResultBtn")?.addEventListener("click", () => {
            let msg = `🧪 Teachers Academy Bahawalpur - Test Result 🧪\n\nStudent: ${currentStudent.name}\nChapter: ${MATH_CHAPTERS[resultData.chapterId].name}\nScore: ${resultData.score}/${resultData.total}\nPercentage: ${Math.round(resultData.score/resultData.total*100)}%\n\n🏫 ${currentStudent.school}, ${currentStudent.city}`;
            let url = `https://wa.me/?text=${encodeURIComponent(msg)}`;
            window.open(url, '_blank');
        });
    }

    loadData();
    render();
</script>
</body>
</html>
